version: 2
updates:
  # Keep the workflow's GitHub-owned actions current (checkout, the Pages
  # actions, etc.). Grouped into a single PR to reduce noise.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Track the Dockerfile base image (ubuntu) for security patches, but
  # stay on the pinned LTS — ignore version bumps (e.g. 24.04 -> 26.04).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: ubuntu
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
