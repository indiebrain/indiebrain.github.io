name: Build and deploy site

# Org is the source of truth on `source`. This builds the site inside the
# prebuilt toolchain image (ghcr.io/.../site-builder) and deploys to
# GitHub Pages. Only GitHub-owned actions are used around the container,
# so it is unaffected by the account's block on third-party actions.
on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/site-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Export Org to Markdown (ox-hugo)
        run: emacs --batch -Q -l build/export.el

      - name: Build resume PDF
        run: emacs --batch -Q -l build/resume.el

      - name: Build site
        run: hugo --gc --minify

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
