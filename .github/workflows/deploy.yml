name: Build and deploy site

# One workflow, ordered by `needs:` — the image is (re)built first, then
# the site is built inside it, then deployed. The image is only rebuilt
# when the Dockerfile or export.el changes; otherwise the existing GHCR
# image is reused. Only GitHub-owned actions run outside the container,
# so this avoids the account's block on third-party actions.
on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Decide whether to (re)build the toolchain image
        id: check
        run: |
          rebuild=false
          if ! git rev-parse -q --verify HEAD^ >/dev/null; then
            rebuild=true
          elif git diff --name-only HEAD^ HEAD | grep -qE '^(Dockerfile|build/export\.el)$'; then
            rebuild=true
          fi
          echo "rebuild=$rebuild" >> "$GITHUB_OUTPUT"
          echo "Rebuild image: $rebuild"

      - name: Build and push image
        if: steps.check.outputs.rebuild == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          image="ghcr.io/${{ github.repository }}/site-builder"
          docker build -t "${image}:latest" .
          docker push "${image}:latest"

  build:
    needs: image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/site-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Export Org to Markdown (ox-hugo)
        run: emacs --batch -Q -l build/export.el
      - name: Build resume PDF
        run: emacs --batch -Q -l build/resume.el
      - name: Build site
        run: hugo --gc --minify
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
