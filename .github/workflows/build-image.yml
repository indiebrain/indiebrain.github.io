name: Build toolchain image

# Builds the build-toolchain image and pushes it to GHCR. Uses only the
# GitHub-owned checkout action plus the docker CLI, so it is unaffected
# by the account's block on third-party marketplace actions.
on:
  push:
    branches: [source]
    paths:
      - Dockerfile
      - build/export.el
      - .github/workflows/build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          image="ghcr.io/${{ github.repository }}/site-builder"
          docker build -t "${image}:latest" .
          docker push "${image}:latest"
