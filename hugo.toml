baseURL = "https://aaronkuehler.com/"
title = "Aaron Kuehler"

[languages]
  [languages.en]
    locale = "en-US"

# Site-wide values consumed by the SEO and social-sharing meta tags in
# layouts/partials/head-meta.html and the JSON-LD in head-schema.html.
[params]
  author = "Aaron Kuehler"
  # Fallback description for pages that don't set their own front matter
  # description (for example the blog list and tag pages).
  description = "Platform and infrastructure engineer building the CI/CD, container, and data platforms other teams ship against."
  # 1200x630 card shown when a page is shared and sets no image of its own.
  ogImage = "/og-default.png"
  # Canonical profile URLs, emitted as schema.org sameAs for entity linking.
  [params.social]
    github = "https://www.github.com/indiebrain"
    linkedin = "https://www.linkedin.com/in/aaronkuehler/"
# Generated HTML is written here and published from this directory.
publishDir = "public"
# Keep the trailing-slash, directory-style URLs the old site served.
uglyURLs = false

# Reproduce the org-page permalink scheme exactly:
#   /blog/YYYY/MM/DD/<slug>/
# The date comes from each post's `date` front matter (from Org #+DATE),
# the slug from `slug` (from Org #+HUGO_SLUG). See org/ox-hugo-setup.org.
[permalinks]
  blog = "/blog/:year/:month/:day/:slug/"

# The old feed lived at /rss.xml. Renaming the RSS baseName from the Hugo
# default ("index") preserves that path for subscribers in the wild.
[outputFormats]
  [outputFormats.RSS]
    baseName = "rss"

[services]
  [services.rss]
    limit = -1

# ox-hugo emits Markdown that can contain raw HTML from Org export; allow it.
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[taxonomies]
  tag = "tags"
